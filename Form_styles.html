<html>
    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
        rel="stylesheet" 
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
        crossorigin="anonymous">
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
         integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" 
         crossorigin="anonymous"></script>
    </head>
    <body>
        <div class="container">
            <h2>Vertical form</h2>
            <form>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="text" class="form-control-sm" placeholder="Email">
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control-lg" placeholder="password">
                </div>
                <button class="btn btn-info">Submit</button>
            </form>
        </div>
        <br><br>
        
        <div class="container">
            <h2>Horizontal form</h2>
            <form>
                <div class="row mb-3">
                    <div class="col-sm-2 col-form-label"><label class="form-label">Email</label></div>
                <div class="col-sm-10">
                    <input type="email" class="form-control-lg" placeholder="Enter Email">
                </div>
                </div>
                <div class="row mb-3">
                    <div class="col-sm-2 col-form-label"><label class="form-label">Password</label></div>
                <div class="col-sm-10">
                    <input type="password" class="form-control-lg" placeholder="Enter Password">
                </div>
                </div>
                <button class="btn btn-info">Submit</button>
            </form>
        </div>

        <br><br>

        <div class="container">
            <h2>Inline form</h2>
            <form class="row">
                <div class="col-sm-4">
                    <input type="text" class="form-control" placeholder="Username">
                </div>
                <div class="col-sm-4">
                    <input type="password" class="form-control" placeholder="Password">
                </div>
                <div class="col-sm-4">
                <button class="btn btn-info">Submit</button>
                </div>
            </form>
        </div>

        <br><br>

        <div class="container">
            <h2>Floating label</h2>
            <div class="form-floating">
                <input type="text" class="form-control" placeholder="">
                <label class="from-label" for="name">Username</label>
            </div>
            <div class="form-floating">
                <textarea  class="form-control" placeholder="" id="msg" style="height:120px;"></textarea>
                <label for="msg">Message</label>
            </div>
        </div>
        <br>
        <div class="form-floating">
            <select class="form-select">
                <option selected>---List---</option>
                <option>Ahmedabad</option>
                <option>Surat</option>
                <option>Patan</option>
            </select>
            <label>Select city</label>
        </div>
        <br>
        <div class="form-check">
            <input class="form-check-input" type="radio" name="gen">
            <label class="form-check-label">Male</label>
        </div>
        <div class="form-check">
            <input class="form-check-input" type="radio" name="gen">
            <label class="form-check-label">Female</label>
        </div>
        <div class="mb-3">
            <label class="form-label">Hobbies</label>
            <br>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" name="gen">
                <label class="form-check-label">Travelling</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" name="gen">
                <label class="form-check-label">Photography</label>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Agree</label>
            <br>
            <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" >
                <label class="form-check-label">Terms & Condition</label>
            </div>
        </div>

        <div class="mb-3">
            <input type="range" class="form-range" min="1" max="10" step="1">
        </div>
        <div class="input-group">
            <span class="input-group-text">Rs</span>
            <input type="text" class="form-control" placeholder="Amount">
        </div>
    </div>
    </body>
</html>
